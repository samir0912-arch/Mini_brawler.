workflows:
  ios-workflow:
    name: Game by Samir iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    scripts:
      - name: Force Create iOS Folder
        script: | 
          # This forces Flutter to build the skeleton properly
          flutter create --platforms=ios .
      - name: Get Packages
        script: | 
          flutter pub get
      - name: Generate App Icons
        script: | 
          flutter pub run flutter_launcher_icons
      - name: Build IPA
        script: | 
          # We tell it exactly where to find the project now
          flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
